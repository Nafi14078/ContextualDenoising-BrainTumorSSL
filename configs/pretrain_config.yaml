# ─────────────────────────────────────────────
#  Pretraining Config  (BraTS2021 → STS-UVD)
# ─────────────────────────────────────────────

data:
  brats2021_root:   "/kaggle/input/brats2021-preprocessed/train"
  output_slices:    "/kaggle/input/brats2021-preprocessed/slices"
  modalities:       ["t1", "t1ce", "t2", "flair"]
  axis:             2            # 2 = axial
  slice_skip:       25           # skip first & last N slices (mostly background)
  min_brain_ratio:  0.08         # discard slices with <8% brain voxels
  img_size:         240          # slices are 240×240 in BraTS2021
  patch_size:       192          # random crop size during training
  val_split:        0.1
  max_train_subjects: 478         # → ~50,000 train slices (104.5 avg slices/subject)
  max_val_subjects:   53          # → ~5,554 val slices (proportional 90/10 split)

sts:
  N:                7            # slice window: central ± 3
  L:                1            # curvature of temporal weight curve
  replace_ratio:    0.15         # spatial kernel: fraction of pixels replaced
  window:           5            # spatial kernel: neighbourhood window
  alpha:            3.0          # spatial kernel: edge emphasis
  eta:              0.0003       # NCC → kappa0 scaling factor

model:
  in_channels:      4            # one per modality
  base_channels:    48
  depth:            5            # U-Net depth (encoder blocks)
  group_norm_groups: 8

training:
  epochs:           30
  batch_size:       4            # 4 slice-windows per step
  lr:               0.0001
  lr_decay_step:    10           # halve LR every N epochs
  weight_decay:     0.0005
  beta1:            0.5
  beta2:            0.9
  delta:            0.0001       # convergence threshold for consistency loss
  amp:              true         # mixed precision — essential on Kaggle T4
  save_every:       5            # checkpoint every N epochs
  checkpoint_dir:   "/kaggle/working/checkpoints/pretrain"
  seed:             42

logging:
  log_every:        50           # steps